name: Production Rollback

# Geri Alma — Blue-Green / Rollback — Blue-Green
#
# previous_folder: nginx trafiklerini diger (onceki surum calistiran) renge cevir + graceful reload.
#   Sifir kesinti: aktif renk hic kapanmaz.
# specific_commit: belirtilen commit'i idle renge derle/yayinla, sagliktan gecince gecis yap.
#
# previous_folder: switch nginx traffic to the other color (running the previous version) + reload.
#   Zero-downtime: the active color never goes down.
# specific_commit: build/publish the specified commit to the idle color, switch on health pass.
#
# BU DOSYAYI DUZENLEMENIZE GEREK YOK. Ayni repo Variables/Secrets kullanilir (bkz. production-deploy.yml).
# NO NEED TO EDIT THIS FILE. Uses the same repo Variables/Secrets (see production-deploy.yml).

on:
  workflow_dispatch:
    inputs:
      description:
        description: "Neden geri aliniyor / Why rolling back"
        required: true
        type: string
      mode:
        description: "Geri alma modu / Rollback mode"
        required: true
        type: choice
        options:
          - previous_folder
          - specific_commit
        default: previous_folder
      commit_sha:
        description: "Belirli commit SHA (specific_commit modu) / specific commit SHA"
        required: false
        type: string

# run-name onay listesinde ve run gecmisinde gorunur.
# run-name is visible in the approval list and run history.
run-name: "Production Rollback | ${{ inputs.description }} | mode: ${{ inputs.mode }} | by ${{ github.actor }}"

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

# En az yetki / least privilege: checkout + derleme icin sadece okuma
# Only read access for checkout + build
permissions:
  contents: read

env:
  DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET || 'local' }}
  SERVICES: ${{ vars.SERVICES }}
  SSH_HOST: ${{ vars.SSH_HOST }}
  SSH_USER: ${{ vars.SSH_USER }}
  SSH_PORT: ${{ vars.SSH_PORT || '22' }}
  SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}

jobs:
  # prepare: onaysiz, hemen kosar. Onaylayan kisi bu job'in ozetini gorur, sonra onay verir.
  # prepare: runs without approval. The reviewer sees this job's summary before approving.
  prepare:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - name: Rollback on bilgisi / pre-rollback info
        run: |
          {
            echo "## Rollback Onay Ozeti / Approval Summary"
            echo ""
            echo "| Alan / Field | Deger / Value |"
            echo "|---|---|"
            echo "| Tetikleyen / Triggered by | **${{ github.actor }}** |"
            echo "| Sebep / Reason | **${{ inputs.description }}** |"
            echo "| Mod / Mode | \`${{ inputs.mode }}\` |"
            if [ "${{ inputs.mode }}" = "specific_commit" ]; then
              echo "| Hedef commit / Target commit | \`${{ inputs.commit_sha }}\` |"
            fi
            echo ""
            echo "> **previous_folder:** nginx trafiklerini anlık diger renge (onceki surum) ceviririr — sifir kesinti."
            echo "> **previous_folder:** instantly switches nginx to the other color (previous version) — zero-downtime."
            echo ""
            echo "> Onay vermeden once yukaridaki bilgileri dogrulayin."
            echo "> Verify the information above before approving."
          } >> "$GITHUB_STEP_SUMMARY"

  rollback:
    needs: prepare
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.mode == 'specific_commit' && inputs.commit_sha || github.ref }}

      - name: Yapilandirmayi dogrula / validate configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          RUNNER_LABEL: ${{ vars.RUNNER_LABEL }}
        run: |
          if [ -z "${SERVICES// /}" ]; then
            echo "HATA / ERROR: 'SERVICES' repo degiskeni tanimli degil."
            exit 1
          fi
          if [ "$DEPLOY_TARGET" = "remote" ]; then
            missing=0
            for v in SSH_HOST SSH_USER; do
              if [ -z "${!v:-}" ]; then
                echo "HATA / ERROR: remote rollback icin '$v' variable gerekli."
                missing=1
              fi
            done
            if [ -z "${SSH_KNOWN_HOSTS:-}" ]; then
              echo "HATA / ERROR: remote rollback icin 'SSH_KNOWN_HOSTS' variable zorunlu."
              missing=1
            fi
            if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
              echo "HATA / ERROR: remote rollback icin 'SSH_PRIVATE_KEY' secret gerekli."
              missing=1
            fi
            if [ "$missing" -ne 0 ]; then exit 1; fi
          elif [ -z "${RUNNER_LABEL:-}" ] || [ "$RUNNER_LABEL" = "ubuntu-latest" ]; then
            echo "HATA / ERROR: local rollback icin RUNNER_LABEL=self-hosted zorunlu."
            exit 1
          fi

      # --- previous_folder: nginx renk geciside anlik rollback ---
      # --- previous_folder: instant rollback via nginx color switch ---
      - name: Onceki renge gec (anlik, sifir kesinti) / switch to previous color (instant, zero-downtime)
        if: inputs.mode == 'previous_folder'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh rollback

      # --- specific_commit: commit'i idle renge derle + gecis yap ---
      # --- specific_commit: build commit to idle color + switch ---
      - name: Belirli commit - build + test / specific commit - build + test
        if: inputs.mode == 'specific_commit'
        uses: ./.github/actions/build-test

      - name: Belirli commit - IDLE renge yayinla / specific commit - publish to IDLE color
        if: inputs.mode == 'specific_commit'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${{ inputs.commit_sha }}" ]; then
            echo "commit_sha zorunlu / required for specific_commit mode"
            exit 1
          fi
          bash scripts/pipeline.sh publish-source

      - name: Belirli commit - gizli ortami yaz / write secret env
        if: inputs.mode == 'specific_commit'
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh write-env

      - name: Belirli commit - IDLE rengi yeniden baslat / restart IDLE color
        if: inputs.mode == 'specific_commit'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh restart

      - name: Belirli commit - saglik kontrolu (socket) / health check via socket
        if: inputs.mode == 'specific_commit'
        id: health_specific
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh health

      - name: Belirli commit - trafigi gec / switch traffic
        if: inputs.mode == 'specific_commit' && steps.health_specific.outcome == 'success'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh switch

      # --- previous_folder: rollback sonrasi aktif rengi dogrula ---
      # --- previous_folder: verify active color after rollback ---
      - name: Rollback dogrulamasi — aktif renk saglik kontrolu / verify active color health
        if: inputs.mode == 'previous_folder'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh health-active

      - name: Rollback ozeti / summary
        if: always()
        run: |
          {
            echo "## Rollback"
            echo "- Yapan / by: **${{ github.actor }}**"
            echo "- Mod / mode: **${{ inputs.mode }}**"
            echo "- Sebep / reason: ${{ inputs.description }}"
          } >> "$GITHUB_STEP_SUMMARY"
