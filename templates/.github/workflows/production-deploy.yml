name: Production Deploy

# Sürekli Dağıtım — Blue-Green / Continuous Deployment — Blue-Green
#
# Blue-green modeli: yeni surum IDLE renge yazilir; saglik kontrolundan gecince
# nginx graceful reload ile AKTIF rene gecer. Eski renk hic kapanmaz — anlik
# rollback hedefidir. Saglik gecemediyse gecis YAPILMAZ; canli etkilenmez.
#
# Blue-green model: the new release is written to the IDLE color; on health pass
# nginx graceful-reloads to make it ACTIVE. The old color never goes down — it
# is an instant rollback target. If health fails the switch is NOT made; live
# traffic is never affected.
#
# BU DOSYAYI DUZENLEMENIZE GEREK YOK. Tum proje bilgileri repo Variables/Secrets'tan okunur.
# NO NEED TO EDIT THIS FILE. All project values are read from repo Variables/Secrets.
#   Settings > Secrets and variables > Actions
#   - Variable  DEPLOY_TARGET  : local (varsayilan) veya remote
#   - Variable  SERVICES       : name|csproj|deploy_dir|service_name|health_url
#                                health_url = nginx'in dinledigi public port + health path
#                                health_url = public port nginx listens on + health path
#   - Variable  RUNNER_LABEL   : runner etiketi (remote icin ubuntu-latest onerilir)
#   - Variable  SSH_HOST       : uzak sunucu IP/hostname (remote)
#   - Variable  SSH_USER       : SSH kullanicisi (remote)
#   - Variable  SSH_PORT       : SSH portu (varsayilan 22, remote)
#   - Variable  SSH_KNOWN_HOSTS : (onerilir / recommended) sunucu host key satiri
#   - Secret    SSH_PRIVATE_KEY : deploy SSH private key (remote, sifresiz)
#   - Secret    APP_ENV        : (opsiyonel) KEY=VALUE satirlari

on:
  workflow_dispatch:
    inputs:
      description:
        description: "Ne deploy ediliyor / What is being deployed"
        required: true
        type: string
      source:
        description: "Deploy kaynagi / Deploy source"
        required: true
        type: choice
        options:
          - ci_artifact
          - build_from_source
        default: ci_artifact

# run-name onay listesinde ve run gecmisinde gorunur.
# Onaylayan kisi buradan deploy aciklamasini ve commit'i gorebilir.
# run-name is visible in the approval list and run history.
# The reviewer can see the deploy description and commit from here.
run-name: "Production Deploy | ${{ inputs.description }} | by ${{ github.actor }} | ${{ github.sha }}"

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

# En az yetki / least privilege: sadece checkout + CI artifact API okuma
# Only checkout + read access to the CI artifact API
permissions:
  contents: read
  actions: read

env:
  DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET || 'local' }}
  SERVICES: ${{ vars.SERVICES }}
  ARTIFACT_NAME: ${{ vars.ARTIFACT_NAME || 'app-publish' }}
  SSH_HOST: ${{ vars.SSH_HOST }}
  SSH_USER: ${{ vars.SSH_USER }}
  SSH_PORT: ${{ vars.SSH_PORT || '22' }}
  SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}

jobs:
  # prepare: onaysiz, hemen kosar. Onaylayan kisi bu job'in ozetini gorur, sonra onay verir.
  # prepare: runs without approval. The reviewer sees this job's summary before approving.
  prepare:
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    outputs:
      commit_subject: ${{ steps.info.outputs.commit_subject }}
      commit_hash: ${{ steps.info.outputs.commit_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on bilgisi / pre-deploy info
        id: info
        run: |
          SUBJECT="$(git log -1 --pretty=%s)"
          SHORT_SHA="$(git log -1 --pretty=%h)"
          echo "commit_subject=$SUBJECT" >> "$GITHUB_OUTPUT"
          echo "commit_hash=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "## Deploy Onay Ozeti / Approval Summary"
            echo ""
            echo "| Alan / Field | Deger / Value |"
            echo "|---|---|"
            echo "| Tetikleyen / Triggered by | **${{ github.actor }}** |"
            echo "| Aciklama / Description | **${{ inputs.description }}** |"
            echo "| Commit | \`${SHORT_SHA}\` — ${SUBJECT} |"
            echo "| Kaynak / Source | \`${{ inputs.source }}\` |"
            echo "| Hedef / Target | \`${{ vars.DEPLOY_TARGET || 'local' }}\` |"
            echo ""
            echo "> Onay vermeden once yukaridaki bilgileri dogrulayin."
            echo "> Verify the information above before approving."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: prepare
    runs-on: ${{ vars.RUNNER_LABEL || 'self-hosted' }}
    environment: production    # onay kapisi bu ortama baglanir / approval gate binds to this environment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Yapilandirmayi dogrula / validate configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SERVICES// /}" ]; then
            echo "HATA / ERROR: 'SERVICES' repo degiskeni tanimli degil."
            exit 1
          fi
          if [ "$DEPLOY_TARGET" = "remote" ]; then
            missing=0
            for v in SSH_HOST SSH_USER; do
              if [ -z "${!v:-}" ]; then
                echo "HATA / ERROR: remote deploy icin '$v' variable gerekli."
                missing=1
              fi
            done
            if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
              echo "HATA / ERROR: remote deploy icin 'SSH_PRIVATE_KEY' secret gerekli."
              missing=1
            fi
            if [ "$missing" -ne 0 ]; then exit 1; fi
            echo "Deploy modu / mode: remote -> ${SSH_USER}@${SSH_HOST}:${SSH_PORT}"
          else
            echo "Deploy modu / mode: local (runner = hedef host)"
          fi

      - name: Deploy ozeti / summary
        run: |
          {
            echo "## Deploy (Blue-Green)"
            echo "- Yapan / by: **${{ github.actor }}**"
            echo "- Aciklama / description: **${{ inputs.description }}**"
            echo "- Commit: \`${{ needs.prepare.outputs.commit_hash }}\` — ${{ needs.prepare.outputs.commit_subject }}"
            echo "- Mod / mode: **${DEPLOY_TARGET}**"
            echo "- Kaynak / source: **${{ inputs.source }}**"
            if [ "$DEPLOY_TARGET" = "remote" ]; then
              echo "- Hedef / target: **${SSH_USER}@${SSH_HOST}:${SSH_PORT}**"
            fi
            echo ""
            echo "> Yeni surum IDLE renge yazilir. Saglik gecince nginx trafiklerini cevirmeden (graceful reload) yeni surumu aktiflestirir."
            echo "> The new release is written to the IDLE color. On health pass nginx makes it active via graceful reload."
          } >> "$GITHUB_STEP_SUMMARY"

      # DUZENLE / EDIT (opsiyonel): veritabani/altyapi hazirligi
      # - name: Altyapi hazir / ensure infra
      #   run: bash scripts/ensure-infra.sh

      - name: Build + test (kaynaktan) / (from source)
        if: inputs.source == 'build_from_source'
        uses: ./.github/actions/build-test

      - name: Son basarili CI artifactini indir / download latest successful CI artifact
        if: inputs.source == 'ci_artifact'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          META="$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=continuous-integration.yml \
            --branch="${{ github.ref_name }}" \
            --status=success \
            --limit=1 \
            --json databaseId,headSha -q '.[0] | "\(.databaseId)|\(.headSha)"')"
          RUN_ID="${META%%|*}"
          RUN_SHA="${META##*|}"
          if [ -z "$META" ] || [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Basarili CI run bulunamadi / no successful CI run found"
            exit 1
          fi
          # Provenance: artifacti ureten commit, deploy edilen commit ile ayni olmali.
          # Provenance: the commit that produced the artifact must equal the deployed commit.
          if [ "$RUN_SHA" != "${{ github.sha }}" ]; then
            echo "HATA / ERROR: CI artifact commit ($RUN_SHA) != deploy commit (${{ github.sha }})."
            echo "Bu commit icin CI'i calistirin ya da kaynak olarak 'build_from_source' secin."
            echo "Run CI for this commit, or choose 'build_from_source' as the source."
            exit 1
          fi
          ROOT="$(mktemp -d)"
          gh run download "$RUN_ID" -R "${{ github.repository }}" -n "$ARTIFACT_NAME" -D "$ROOT"
          echo "ARTIFACT_ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: IDLE renge yayinla (artifact) / publish to IDLE color (artifact)
        if: inputs.source == 'ci_artifact'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh deploy-artifacts

      - name: IDLE renge yayinla (kaynaktan) / publish to IDLE color (from source)
        if: inputs.source == 'build_from_source'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh publish-source

      - name: Gizli ortami yaz / write secret environment
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh write-env

      - name: Deploy bilgisini yaz / write deploy info
        env:
          GIT_SHA: ${{ github.sha }}
          DEPLOYED_BY: ${{ github.actor }}
          DEPLOY_NOTE: ${{ inputs.description }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh write-info

      - name: IDLE rengi yeniden baslat / restart IDLE color service
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh restart

      - name: Saglik kontrolu (socket) / health check via socket
        id: health
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: bash scripts/pipeline.sh health

      - name: Trafigi yeni surume gec (nginx reload) / switch traffic to new version
        if: steps.health.outcome == 'success'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          bash scripts/pipeline.sh switch
          echo "- Gecis basarili / switch successful: IDLE renk artik AKTIF / IDLE color is now ACTIVE" >> "$GITHUB_STEP_SUMMARY"

      - name: Saglik basarisiz — canli etkilenmedi / health failed — live not affected
        if: steps.health.outcome == 'failure'
        run: |
          {
            echo "## Deploy Basarisiz / Deploy Failed"
            echo ""
            echo "IDLE rengin saglik kontrolu gecilemedi. nginx gecisi YAPILMADI."
            echo "Health check of the IDLE color failed. nginx switch was NOT made."
            echo ""
            echo "**Canli trafik etkilenmedi / Live traffic was NOT affected.**"
            echo ""
            echo "Yapilabilecekler / Next steps:"
            echo "- IDLE rengin loglarini inceleyin / inspect IDLE color logs"
            echo "- Sorunu duzeltin, yeniden deploy yayin / fix the issue, redeploy"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
