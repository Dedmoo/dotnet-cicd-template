name: Blueprint Self-Test

# Blueprint deposunun KENDI CI'i (sablonu kullanan repolarin CI'i degil).
# Templates altindaki shell scriptleri ve workflow'lari statik olarak dogrular.
# GitHub tarafindan barindirilan runner'da calisir (self-hosted DEGIL).
#
# The blueprint repo's OWN CI (not the consumer repo's CI). Statically validates
# the shell scripts and workflows under templates/. Runs on a GitHub-hosted runner
# (NOT self-hosted).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: selftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: LF line endings (shell scripts)
        run: |
          bad=0
          for f in templates/scripts/*.sh tests/*.sh; do
            if grep -q $'\r' "$f"; then
              echo "CRLF: $f"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            echo "HATA: Shell scriptleri LF olmali (.gitattributes *.sh eol=lf)."
            exit 1
          fi

      - name: ShellCheck (templates/scripts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck --version
          shellcheck -x -e SC1091 templates/scripts/*.sh

      - name: actionlint (templates workflows + action)
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -version
          ./actionlint -ignore "could not read reusable workflow file" \
            templates/.github/workflows/*.yml \
            .github/workflows/*.yml

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573fe9a986a3f1ea547c81811f96624b38ad # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Comprehensive audit
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          python3 tests/comprehensive-audit.py
