name: Blueprint Self-Test

# Blueprint deposunun KENDI CI'i (sablonu kullanan repolarin CI'i degil).
# Templates altindaki shell scriptleri ve workflow'lari statik olarak dogrular.
# GitHub tarafindan barindirilan runner'da calisir (self-hosted DEGIL).
#
# The blueprint repo's OWN CI (not the consumer repo's CI). Statically validates
# the shell scripts and workflows under templates/. Runs on a GitHub-hosted runner
# (NOT self-hosted).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: selftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ShellCheck (templates/scripts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck --version
          # -x: 'source' ile dahil edilen dosyalari takip et (ssh-remote.sh).
          # -e SC1091: source yolu ${SCRIPT_DIR} calisma-zamani degiskeni oldugundan
          # statik olarak cozulemez; bu info bulgusu kacinilmazdir ve gizlenir.
          # Diger tum severity'ler (style/info dahil) aktiftir.
          # -x: follow sourced files (ssh-remote.sh). -e SC1091: the source path uses
          # the runtime var ${SCRIPT_DIR} so it can't be resolved statically; this info
          # finding is unavoidable and is excluded. All other severities remain active.
          shellcheck -x -e SC1091 templates/scripts/*.sh

      - name: actionlint (templates workflows + action)
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -version
          # Sablon workflow'lari ve bu self-test workflow'unu dogrula.
          # -ignore: blueprint deposunda reusable workflow 'templates/.github' altinda
          # oldugundan './.github/...' referansi burada cozulemez (yanlis pozitif).
          # Tuketici deposunda kok '.github' altina kopyalandiginda dogru cozulur.
          # -ignore: in the blueprint repo the reusable workflow lives under
          # 'templates/.github', so the './.github/...' reference cannot resolve here
          # (false positive). It resolves correctly once copied to a consumer's root.
          ./actionlint -ignore "could not read reusable workflow file" \
            templates/.github/workflows/*.yml \
            .github/workflows/*.yml
